name: Validate

on:
  push:
  pull_request:

jobs:
  pytest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout the repository
        uses: actions/checkout@v4
      - name: 📦 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest requests
      - name: Run tests
        run: python -m pytest tests -q

  spellcheck_lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout the repository
        uses: actions/checkout@v4

      - name: ✅ Run PySpelling as a GitHub action
        continue-on-error: true
        uses: rojopolis/spellcheck-github-actions@0.14.0
        with:
          config_path: spellcheck.yml

  python_linting:
    name: Python linting
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Check out source repository
        uses: actions/checkout@v4
      - name: 📦 Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        run: python -m pip install flake8
      - name: ✅ flake8 Lint
        run: >-
          python -m flake8
          custom_components/opencwb/agriculture_state.py
          custom_components/opencwb/agriculture_update_coordinator.py
          custom_components/opencwb/core/agriculture
          custom_components/opencwb/__init__.py
          custom_components/opencwb/config_flow.py
          custom_components/opencwb/sensor.py
          custom_components/opencwb/binary_sensor.py
          tests/test_kcg_agriculture.py
          tests/test_optional_agriculture_setup.py
          --ignore=F401
          --max-line-length=120

  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        continue-on-error: true
        uses: "hacs/action@main"
        with:
          category: "integration"